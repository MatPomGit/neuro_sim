    <div id="regionStatus" class="status">Region: —</div>
  </main>

  <script>
    const REGION_LABELS = {
      DLPFC_L: "DLPFC lewy", DLPFC_R: "DLPFC prawy", mPFC: "mPFC",
      ACC: "Przednia kora zakrętu obręczy", PCC: "Tylna kora zakrętu obręczy",
      M1_L: "Kora ruchowa lewa", M1_R: "Kora ruchowa prawa",
      S1_L: "Kora somatosensoryczna lewa", S1_R: "Kora somatosensoryczna prawa",
      IPS_L: "Bruzda śródciemieniowa lewa", IPS_R: "Bruzda śródciemieniowa prawa",
      Angular_L: "Zakręt kątowy lewy", Angular_R: "Zakręt kątowy prawy",
      IFG_L: "Zakręt czołowy dolny lewy", IFG_R: "Zakręt czołowy dolny prawy",
      STG_L: "Zakręt skroniowy górny lewy", STG_R: "Zakręt skroniowy górny prawy",
      A1_L: "Pierwotna kora słuchowa lewa", A1_R: "Pierwotna kora słuchowa prawa",
      Insula_L: "Wyspa lewa", Insula_R: "Wyspa prawa",
      Thalamus_L: "Wzgórze lewe", Thalamus_R: "Wzgórze prawe",
      BasalGanglia_L: "Jądra podstawy lewe", BasalGanglia_R: "Jądra podstawy prawe",
      HIP_L: "Hipokamp lewy", HIP_R: "Hipokamp prawy",
      AMY_L: "Ciało migdałowate lewe", AMY_R: "Ciało migdałowate prawe",
      V1_L: "Kora wzrokowa pierwotna lewa", V1_R: "Kora wzrokowa pierwotna prawa",
      V2_L: "Kora wzrokowa wtórna lewa", V2_R: "Kora wzrokowa wtórna prawa",
      Cerebellum_L: "Móżdżek lewy", Cerebellum_R: "Móżdżek prawy",
      Brainstem: "Pień mózgu"
    };

    function clamp01(x) { return Math.max(0, Math.min(1, Number(x) || 0)); }

    function activityColor(value) {
      const x = clamp01(value);
      const low = [226, 232, 240];
      const mid = [96, 165, 250];
      const high = [239, 68, 68];
      let a, b, t;
      if (x < 0.5) { a = low; b = mid; t = x / 0.5; }
      else { a = mid; b = high; t = (x - 0.5) / 0.5; }
      const r = Math.round(a[0] + t * (b[0] - a[0]));
      const g = Math.round(a[1] + t * (b[1] - a[1]));
      const bl = Math.round(a[2] + t * (b[2] - a[2]));
      return `rgb(${r}, ${g}, ${bl})`;
    }

    function setRegionActivity(regionName, value) {
      const x = clamp01(value);
      const color = activityColor(x);
      document.querySelectorAll(`[data-region="${regionName}"]`).forEach(path => {
        path.style.fill = color;
        path.classList.toggle("inactive", x < 0.05);
        path.classList.toggle("active", x >= 0.05);
        path.dataset.activity = x.toFixed(3);
      });
    }

    function setBrainFrame(frameData) {
      document.querySelectorAll(".brain-region").forEach(path => setRegionActivity(path.dataset.region, 0));
      Object.entries(frameData).forEach(([region, value]) => setRegionActivity(region, value));
    }

    const simulationFrames = [
      { time: 0.00, activity: { DLPFC_L: 0.10, DLPFC_R: 0.10, ACC: 0.15, HIP_L: 0.12, HIP_R: 0.12, Brainstem: 0.20 } },
      { time: 1.00, activity: { V1_L: 0.50, V1_R: 0.50, IPS_L: 0.38, IPS_R: 0.40, ACC: 0.32, Thalamus_L: 0.28, Thalamus_R: 0.28 } },
      { time: 2.00, activity: { DLPFC_L: 0.82, DLPFC_R: 0.78, ACC: 0.70, M1_L: 0.45, M1_R: 0.42, BasalGanglia_L: 0.55, BasalGanglia_R: 0.52 } },
      { time: 3.00, activity: { HIP_L: 0.68, HIP_R: 0.64, AMY_L: 0.60, AMY_R: 0.58, Insula_L: 0.76, Insula_R: 0.72, STG_L: 0.34, STG_R: 0.32 } }
    ];

    const timeSlider = document.getElementById("timeSlider");
    const timeLabel = document.getElementById("timeLabel");
    let currentFrame = 0;
    let timer = null;

    function renderFrame(index) {
      currentFrame = Math.max(0, Math.min(index, simulationFrames.length - 1));
      const frame = simulationFrames[currentFrame];
      setBrainFrame(frame.activity);
      timeSlider.value = currentFrame;
      timeLabel.textContent = `${frame.time.toFixed(2)} s`;
    }

    timeSlider.max = simulationFrames.length - 1;
    timeSlider.addEventListener("input", e => renderFrame(Number(e.target.value)));
    document.getElementById("playButton").addEventListener("click", () => {
      if (timer) return;
      timer = setInterval(() => {
        if (currentFrame >= simulationFrames.length - 1) { clearInterval(timer); timer = null; return; }
        renderFrame(currentFrame + 1);
      }, 450);
    });
    document.getElementById("pauseButton").addEventListener("click", () => { clearInterval(timer); timer = null; });
    document.getElementById("stopButton").addEventListener("click", () => { clearInterval(timer); timer = null; renderFrame(0); });

    document.addEventListener("mouseover", event => {
      const region = event.target.closest(".brain-region");
      if (!region) return;
      const name = region.dataset.region;
      const label = REGION_LABELS[name] || region.dataset.label || name;
      const value = region.dataset.activity || "0.000";
      document.getElementById("regionStatus").textContent = `Region: ${label} (${name}), aktywność: ${value}`;
    });

    renderFrame(0);
  </script>
